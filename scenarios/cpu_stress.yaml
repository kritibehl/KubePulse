scenario: cpu_stress
fault_injected: cpu_saturation
expected_blast_radius:
  - api latency increase
  - transient error-rate increase
expected_signals:
  - p95 latency drift
  - p99 latency drift
  - recovery delay
must_hold_invariants:
  - no full outage
  - eventual recovery
must_not_happen:
  - prolonged false-green beyond threshold
safe_to_operate_thresholds:
  availability_min_pct: 99.0
  p95_max_ms: 300
  p99_max_ms: 500
  error_rate_max_pct: 1.0
expected_recovery_window_seconds: 15
