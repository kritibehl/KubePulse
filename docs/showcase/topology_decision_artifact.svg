<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="860" fill="#0B1020"/>
  <rect x="40" y="32" width="1200" height="796" rx="24" fill="#11182D" stroke="#26324D"/>

  <text x="72" y="92" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    KubePulse — Decision Artifact
  </text>
  <text x="72" y="128" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Topology-aware resilience validation for backend and AI services
  </text>

  <rect x="72" y="162" width="1136" height="116" rx="18" fill="#0F172A" stroke="#1E293B"/>
  <text x="96" y="206" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Scenario</text>
  <text x="96" y="236" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">link_failure_failover</text>
  <text x="96" y="262" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">
    Validated multi-hop reroute after link-down event in topology decision layer
  </text>

  <rect x="72" y="306" width="270" height="120" rx="18" fill="#10223A" stroke="#1D4ED8"/>
  <text x="96" y="344" fill="#BFDBFE" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Probes Healthy?</text>
  <text x="96" y="390" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">YES</text>
  <text x="96" y="414" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="15">
    readiness stayed green
  </text>

  <rect x="362" y="306" width="270" height="120" rx="18" fill="#35131A" stroke="#DC2626"/>
  <text x="386" y="344" fill="#FECACA" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">SLO Met?</text>
  <text x="386" y="390" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">NO</text>
  <text x="386" y="414" fill="#FCA5A5" font-family="Arial, Helvetica, sans-serif" font-size="15">
    latency + error budget breach
  </text>

  <rect x="652" y="306" width="270" height="120" rx="18" fill="#35131A" stroke="#DC2626"/>
  <text x="676" y="344" fill="#FECACA" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Safe to Operate?</text>
  <text x="676" y="390" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">NO</text>
  <text x="676" y="414" fill="#FCA5A5" font-family="Arial, Helvetica, sans-serif" font-size="15">
    degraded failover path
  </text>

  <rect x="942" y="306" width="266" height="120" rx="18" fill="#1B2437" stroke="#475569"/>
  <text x="966" y="344" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Recommendation</text>
  <text x="966" y="390" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">REROUTE</text>
  <text x="966" y="414" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="15">
    not safe to continue on degraded path
  </text>

  <rect x="72" y="456" width="540" height="290" rx="18" fill="#0F172A" stroke="#1E293B"/>
  <text x="96" y="496" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">What Probes Missed</text>
  <circle cx="102" cy="542" r="4" fill="#F87171"/>
  <text x="118" y="548" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="18">
    readiness stayed green while traffic shifted onto a degraded failover path
  </text>
  <circle cx="102" cy="592" r="4" fill="#F87171"/>
  <text x="118" y="598" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="18">
    user-facing latency increased even after reachability recovered
  </text>
  <circle cx="102" cy="642" r="4" fill="#F87171"/>
  <text x="118" y="648" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="18">
    path recovered partially, but SLO and safe-to-operate checks still failed
  </text>

  <rect x="640" y="456" width="568" height="290" rx="18" fill="#0F172A" stroke="#1E293B"/>
  <text x="664" y="496" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Key Metrics</text>

  <text x="664" y="544" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Convergence</text>
  <text x="1030" y="544" text-anchor="end" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">2.4s</text>

  <text x="664" y="586" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Path Changes</text>
  <text x="1030" y="586" text-anchor="end" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">1</text>

  <text x="664" y="628" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Unreachable Window</text>
  <text x="1030" y="628" text-anchor="end" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">0.0s</text>

  <text x="664" y="670" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Degraded-Path Requests</text>
  <text x="1030" y="670" text-anchor="end" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">12</text>

  <text x="664" y="712" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">p95 Drift</text>
  <text x="1030" y="712" text-anchor="end" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">125%</text>

  <text x="664" y="754" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Extra Path Latency</text>
  <text x="1030" y="754" text-anchor="end" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">80 ms</text>

  <rect x="72" y="772" width="1136" height="32" rx="12" fill="#0B1222"/>
  <text x="96" y="793" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="14">
    Baseline path: edge → router-a → api → auth → downstream   |   Final path: edge → router-a → auth → downstream
  </text>
</svg>
