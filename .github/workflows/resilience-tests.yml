name: kubepulse-resilience-tests

on:
  push:
  pull_request:

jobs:
  resilience-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install fastapi uvicorn requests prometheus-client pyyaml pytest

      - name: Run unit tests
        run: |
          pytest -q

      - name: Run resilience decision gate
        run: |
          python3 scripts/ci_gate.py

      - name: Start KubePulse
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > kubepulse.log 2>&1 &
          echo $! > kubepulse.pid

      - name: Wait for KubePulse
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "kubepulse is up"
              exit 0
            fi
            sleep 1
          done
          echo "kubepulse failed to start"
          cat kubepulse.log || true
          exit 1

      - name: Smoke check critical routes
        run: |
          curl -fsS http://127.0.0.1:8000/health
          echo
          curl -fsS -X POST http://127.0.0.1:8000/scenarios/readiness-false-positive
          echo
          curl -fsS -X POST http://127.0.0.1:8000/scenarios/multi-service-cascade
          echo

      - name: Show logs on failure
        if: failure()
        run: |
          echo "==== kubepulse.log ===="
          cat kubepulse.log || true
