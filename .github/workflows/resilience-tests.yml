name: kubepulse-resilience-tests

on:
  push:
  pull_request:

jobs:
  resilience-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install fastapi uvicorn requests prometheus-client pyyaml

      - name: Show files
        run: |
          pwd
          ls -R

      - name: Start sample service
        run: |
          ARTIFICIAL_DELAY_MS=0 ERROR_MODE=false python -m uvicorn sample_app.main:app --host 127.0.0.1 --port 9000 > sample_app.log 2>&1 &
          echo $! > sample_app.pid

      - name: Wait for sample service
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/health; then
              echo "sample service is up"
              exit 0
            fi
            sleep 1
          done
          echo "sample service failed to start"
          cat sample_app.log || true
          exit 1

      - name: Start KubePulse
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > kubepulse.log 2>&1 &
          echo $! > kubepulse.pid

      - name: Wait for KubePulse
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "kubepulse is up"
              exit 0
            fi
            sleep 1
          done
          echo "kubepulse failed to start"
          cat kubepulse.log || true
          exit 1

      - name: Smoke check scenario catalog
        run: |
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS http://127.0.0.1:8000/scenarios || true

      - name: Run resilience scenarios
        run: |
          curl -fsS -X POST http://127.0.0.1:8000/scenarios/run/cpu_stress
          echo
          curl -fsS -X POST http://127.0.0.1:8000/scenarios/run/memory_stress
          echo
          curl -fsS -X POST http://127.0.0.1:8000/scenarios/run/readiness_false_positive
          echo

      - name: Fetch latest report and scorecards
        run: |
          curl -fsS http://127.0.0.1:8000/reports/latest
          echo
          curl -fsS http://127.0.0.1:8000/scorecards
          echo

      - name: Show logs on failure
        if: failure()
        run: |
          echo "==== sample_app.log ===="
          cat sample_app.log || true
          echo "==== kubepulse.log ===="
          cat kubepulse.log || true