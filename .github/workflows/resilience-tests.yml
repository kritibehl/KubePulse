name: kubepulse-resilience-tests

on:
  push:
  pull_request:

jobs:
  resilience-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: install dependencies
        run: |
          pip install fastapi uvicorn requests prometheus-client

      - name: start kubepulse
        run: |
          uvicorn app.main:app &
          sleep 5

      - name: run resilience scenarios
        run: |
          bash scripts/ci_resilience_pack.sh
